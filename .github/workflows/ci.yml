name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: |
          # Match conservative defaults; project doesn't currently enforce strict style.
          ruff check backend tests --select=E9,F63,F7,F82 --output-format=github

      - name: Run pytest
        env:
          # Pre-seed dummy crypto keys so config doesn't try to write to .env in CI.
          # ENCRYPTION_KEY must be a valid 32-byte url-safe base64 Fernet key.
          SECRET_KEY: "ci-secret-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          ENCRYPTION_KEY: "vAuauCJy9NGdkXbUl4h0Yc-Wl5SwcEA23WuU5vJ-Q2g="
        run: pytest tests/ -v

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
